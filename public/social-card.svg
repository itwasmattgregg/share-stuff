<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient background matching brand colors -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="0.4" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#faf5ff"/>
    </linearGradient>

    <!-- Primary brand gradient (orange) -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>

    <!-- Secondary accent gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#84cc16"/>
      <stop offset="1" stop-color="#65a30d"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#1c1917" flood-opacity="0.15"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1080" cy="120" r="200" fill="#f97316" opacity="0.08"/>
  <circle cx="120" cy="510" r="240" fill="#84cc16" opacity="0.08"/>
  <circle cx="900" cy="580" r="160" fill="#a78bfa" opacity="0.06"/>

  <!-- Main content card -->
  <g filter="url(#shadow)">
    <rect x="80" y="90" width="1040" height="450" rx="32" fill="white" opacity="0.98"/>
  </g>

  <!-- Logo icon with brand gradient -->
  <g transform="translate(140 140)">
    <rect x="0" y="0" width="100" height="100" rx="24" fill="url(#brand)"/>
    <!-- Menu icon matching site logo -->
    <g transform="translate(25 30)">
      <path d="M5 10H45" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M5 25H45" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M5 40H45" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Brand name -->
  <text x="260" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#1c1917" letter-spacing="-0.02em">
    ShareStuff
  </text>

  <!-- Main tagline -->
  <text x="140" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#1c1917" letter-spacing="-0.02em">
    Build Stronger Communities
  </text>
  <text x="140" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="url(#brand)" letter-spacing="-0.02em">
    Through Sharing
  </text>

  <!-- Subtitle -->
  <text x="140" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#57534e" letter-spacing="0.01em">
    Tools • Books • Resources — shared with neighbors you trust
  </text>

  <!-- Decorative sharing icons (subtle) -->
  <g opacity="0.06" fill="#1c1917">
    <!-- Sharing/network icon -->
    <circle cx="950" cy="200" r="3"/>
    <circle cx="970" cy="200" r="3"/>
    <circle cx="990" cy="200" r="3"/>
    <line x1="950" y1="200" x2="990" y2="200" stroke="#1c1917" stroke-width="1"/>
    
    <!-- Community icon -->
    <circle cx="1020" cy="280" r="4"/>
    <circle cx="1040" cy="280" r="4"/>
    <circle cx="1060" cy="280" r="4"/>
    <line x1="1020" y1="280" x2="1060" y2="280" stroke="#1c1917" stroke-width="1"/>
  </g>

  <!-- Brand tag at bottom -->
  <text x="140" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#78716c" letter-spacing="0.05em">
    ShareStuff
  </text>
</svg>
