# fly.toml app configuration file generated for share-stuff on 2026-06-16T02:06:40Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'share-stuff'
primary_region = 'dfw'

[build]

[deploy]
  release_command = "npx prisma migrate deploy || (echo 'Migration failed, check logs' && exit 1)"

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthcheck'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
