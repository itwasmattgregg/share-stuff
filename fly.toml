# Fly.io configuration for ShareStuff
# Learn more at https://fly.io/docs/reference/configuration/

app = "share-stuff"
primary_region = "sjc"  # San Jose, California

[build]

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one Machine warm. With SQLite + volume, cold starts run migrate
  # before bind and often race Fly's proxy → intermittent "not listening" 502s.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    # Cold start: swap + prisma migrate + remix-serve routinely exceed 10s
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthcheck"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = "data"
  destination = "/data"

[deploy]
  # Prisma CLI is installed globally in the Dockerfile
  # This runs migrations before the app starts
  # Using npx to ensure Prisma is found, and adding error handling
  release_command = "npx prisma migrate deploy || (echo 'Migration failed, check logs' && exit 1)"

# SQLite database configuration
# This app uses SQLite for cost-effective development and testing
# The DATABASE_URL points to a local SQLite file

# Environment variables for production
# Add your production secrets using: fly secrets set KEY=value
# Required secrets:
# - SESSION_SECRET (random string for session encryption)
# - DATABASE_URL (SQLite file path, e.g., "file:./data.db")
# 
# Note: This app requires Node.js 20+ for compatibility with all dependencies
